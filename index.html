<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Message Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0c14;
      --surface:   #111420;
      --surface2:  #181c2e;
      --border:    rgba(255,255,255,0.07);
      --border2:   rgba(255,255,255,0.13);
      --accent:    #6c63ff;
      --accent2:   #a78bfa;
      --accent3:   #38bdf8;
      --text:      #eef0f8;
      --muted:     #6b7280;
      --sent-bg:   #6c63ff;
      --recv-bg:   #181c2e;
      --danger:    #f87171;
      --success:   #34d399;
      --radius:    14px;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

    /* ── Noise overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    /* ── Pages ── */
    .page { display: none; position: relative; z-index: 1; }
    .page.active { display: flex; }

    /* ═══════════════ AUTH ═══════════════ */
    #auth-page {
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .auth-glow {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.12;
      pointer-events: none;
    }
    .auth-glow.purple { background: var(--accent); top: -100px; left: -100px; }
    .auth-glow.blue   { background: var(--accent3); bottom: -150px; right: -100px; }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%; max-width: 440px;
      position: relative;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .auth-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .auth-logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .auth-logo-text {
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .auth-logo-text span { color: var(--accent2); }

    .auth-heading {
      font-family: var(--font-head);
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .auth-sub { color: var(--muted); font-size: 14px; margin-bottom: 28px; }

    .tab-row {
      display: flex;
      background: var(--surface2);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab-btn {
      flex: 1;
      border: none; outline: none;
      background: transparent;
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      padding: 8px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--accent);
      color: #fff;
    }

    .form-group { margin-bottom: 16px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    input[type=text], input[type=email], input[type=password] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
    }
    input::placeholder { color: var(--muted); }

    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 13px;
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px;
      letter-spacing: 0.2px;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .form-error {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      color: var(--danger);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .form-error.show { display: block; }

    /* ═══════════════ MAIN APP ═══════════════ */
    #app-page {
      height: 100vh;
      flex-direction: row;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 300px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      transition: transform 0.3s;
    }

    .sidebar-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .app-brand {
      display: flex; align-items: center; gap: 8px;
    }
    .brand-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .brand-name {
      font-family: var(--font-head);
      font-size: 16px; font-weight: 700;
      letter-spacing: -0.3px;
    }
    .brand-name span { color: var(--accent2); }

    .btn-icon {
      width: 34px; height: 34px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--muted);
      font-size: 15px;
      transition: background 0.15s, color 0.15s;
    }
    .btn-icon:hover { background: var(--border2); color: var(--text); }

    .search-box {
      position: relative;
    }
    .search-box input {
      padding-left: 36px;
      font-size: 13px;
    }
    .search-box .search-icon {
      position: absolute;
      left: 11px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 14px;
      pointer-events: none;
    }

    .sidebar-tabs {
      display: flex;
      padding: 12px 16px 0;
      gap: 4px;
    }
    .stab {
      flex: 1;
      padding: 8px 0;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      font-family: var(--font-head);
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      letter-spacing: 0.3px;
    }
    .stab.active { color: var(--accent2); border-bottom-color: var(--accent2); }

    .conversation-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .conv-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }
    .conv-item:hover { background: rgba(255,255,255,0.03); }
    .conv-item.active { background: rgba(108,99,255,0.1); }
    .conv-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 12px; bottom: 12px;
      width: 3px;
      background: var(--accent);
      border-radius: 0 3px 3px 0;
    }

    .avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 700;
      flex-shrink: 0;
      position: relative;
    }
    .avatar.sm { width: 32px; height: 32px; font-size: 12px; }
    .avatar.lg { width: 48px; height: 48px; font-size: 18px; }

    .online-dot {
      position: absolute;
      bottom: 1px; right: 1px;
      width: 10px; height: 10px;
      background: var(--success);
      border-radius: 50%;
      border: 2px solid var(--surface);
    }

    .conv-info { flex: 1; min-width: 0; }
    .conv-name {
      font-size: 14px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .conv-preview {
      font-size: 12px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-top: 2px;
    }
    .conv-meta {
      display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
    }
    .conv-time { font-size: 11px; color: var(--muted); }
    .unread-badge {
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      width: 18px; height: 18px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
    }
    .user-profile {
      display: flex; align-items: center; gap: 10px;
    }
    .profile-info { flex: 1; min-width: 0; }
    .profile-name {
      font-size: 13px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .profile-dept {
      font-size: 11px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── Chat Main ── */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 16px;
      padding: 40px;
    }
    .empty-icon {
      width: 72px; height: 72px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }
    .empty-title {
      font-family: var(--font-head);
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }
    .empty-sub { font-size: 14px; text-align: center; max-width: 280px; }

    /* Chat header */
    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
    }
    .chat-header-info { flex: 1; }
    .chat-header-name { font-family: var(--font-head); font-size: 16px; font-weight: 700; }
    .chat-header-status { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .chat-header-actions { display: flex; gap: 8px; }

    /* Messages */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .msg-group { margin-bottom: 12px; }
    .msg-group-label {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin: 16px 0 12px;
      display: flex; align-items: center; gap: 10px;
    }
    .msg-group-label::before,
    .msg-group-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .msg {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      margin-bottom: 3px;
      animation: msgIn 0.25s ease both;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.sent { flex-direction: row-reverse; }
    .msg.sent .msg-bubble { background: var(--sent-bg); color: #fff; border-bottom-right-radius: 4px; }
    .msg.recv .msg-bubble { background: var(--recv-bg); border-bottom-left-radius: 4px; border: 1px solid var(--border); }

    .msg-bubble {
      max-width: 60%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .msg-time {
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      margin-bottom: 2px;
      padding: 0 4px;
    }

    /* Input area */
    .chat-input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .message-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 16px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    .message-input:focus { border-color: var(--accent); }
    .message-input::placeholder { color: var(--muted); }

    .btn-send {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 12px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    .btn-send:hover { opacity: 0.85; }
    .btn-send:active { transform: scale(0.94); }

    /* ── Users panel ── */
    .users-panel {
      width: 300px; flex-shrink: 0;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: none;
      flex-direction: column;
      height: 100vh;
    }
    .users-panel.open { display: flex; }
    .users-panel-header {
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .users-panel-title { font-family: var(--font-head); font-size: 15px; font-weight: 700; }
    .users-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .user-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 20px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .user-item:hover { background: rgba(255,255,255,0.03); }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-dept { font-size: 11px; color: var(--muted); }

    /* Loading spinner */
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-msgs {
      display: flex; align-items: center; justify-content: center;
      padding: 40px;
      color: var(--muted);
      gap: 10px;
      font-size: 14px;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text);
      font-size: 13px;
      padding: 10px 20px;
      border-radius: 99px;
      z-index: 9999;
      transition: transform 0.3s ease;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* Alphabet group */
    .alpha-group { padding: 4px 20px 2px; }
    .alpha-label { font-size: 10px; font-weight: 700; color: var(--accent2); letter-spacing: 1px; text-transform: uppercase; }

    /* ══ MOBILE LAYOUT ══════════════════════════════════════════════ */
    @media(max-width: 700px) {

      /* App page: stack panels horizontally, clip to viewport */
      #app-page {
        position: relative;
        overflow: hidden;
        width: 100vw;
      }

      /* Sidebar fills full screen by default on mobile */
      .sidebar {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        z-index: 2;
        transform: translateX(0);
        transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
      }

      /* When a chat is open, sidebar slides out to the left */
      .sidebar.chat-open {
        transform: translateX(-100%);
      }

      /* Chat main fills full screen, starts off-screen to the right */
      .chat-main {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        transform: translateX(100%);
        transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
      }

      /* When chat is active, it slides in */
      .chat-main.chat-open {
        transform: translateX(0);
        z-index: 3;
      }

      /* Show back button in chat header on mobile */
      .back-btn { display: flex !important; }

      /* Users panel: full-screen overlay */
      .users-panel {
        position: fixed;
        top: 0; right: 0;
        width: 100%;
        height: 100%;
        z-index: 20;
        transform: translateX(100%);
        transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      }
      .users-panel.open {
        transform: translateX(0);
      }

      /* Tighter auth card */
      .auth-card { padding: 36px 24px; }

      /* Slightly larger touch targets */
      .conv-item { padding: 14px 18px; }
      .btn-send  { width: 46px; height: 46px; }

      /* Bubbles can go wider */
      .msg-bubble { max-width: 78%; }

      /* Input area safe area */
      .chat-input-area {
        padding-bottom: max(16px, env(safe-area-inset-bottom));
      }
    }
  </style>
</head>
<body>

<!-- ══ AUTH PAGE ══ -->
<div id="auth-page" class="page active">
  <div class="auth-glow purple"></div>
  <div class="auth-glow blue"></div>

  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">💬</div>
      <div class="auth-logo-text">Message<span>Hub</span></div>
    </div>

    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" onclick="switchTab('signup')">Register</button>
    </div>

    <!-- Login Form -->
    <div id="login-form">
      <h2 class="auth-heading">Welcome back</h2>
      <p class="auth-sub">Sign in to your account to continue</p>
      <div id="login-error" class="form-error"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@university.edu" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter your password" />
      </div>
      <button class="btn-primary" id="login-btn" onclick="handleLogin()">Sign In</button>
    </div>

    <!-- Signup Form -->
    <div id="signup-form" style="display:none">
      <h2 class="auth-heading">Create account</h2>
      <p class="auth-sub">Join Message Hub — connect with your department</p>
      <div id="signup-error" class="form-error"></div>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="signup-name" placeholder="Your full name" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="you@university.edu" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Department</label>
          <input type="text" id="signup-dept" placeholder="e.g. Software Eng." />
        </div>
        <div class="form-group">
          <label>Faculty</label>
          <input type="text" id="signup-faculty" placeholder="e.g. Computing" />
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-password" placeholder="Choose a strong password" />
      </div>
      <button class="btn-primary" id="signup-btn" onclick="handleSignup()">Create Account</button>
    </div>
  </div>
</div>

<!-- ══ APP PAGE ══ -->
<div id="app-page" class="page">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-top">
        <div class="app-brand">
          <div class="brand-icon">💬</div>
          <div class="brand-name">Message<span>Hub</span></div>
        </div>
        <div style="display:flex;gap:6px">
          <div class="btn-icon" title="New message" onclick="toggleUsersPanel()">✏️</div>
          <div class="btn-icon" title="Logout" onclick="handleLogout()">🚪</div>
        </div>
      </div>
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="conv-search" placeholder="Search conversations…" oninput="filterConversations()" />
      </div>
    </div>

    <div class="sidebar-tabs">
      <div class="stab active" onclick="switchSidebarTab('chats', this)">Chats</div>
      <div class="stab" onclick="switchSidebarTab('contacts', this)">People</div>
    </div>

    <div class="conversation-list" id="conversation-list"></div>
    <div class="users-dir-list" id="users-dir-list" style="flex:1;overflow-y:auto;display:none;padding:8px 0;"></div>

    <div class="sidebar-footer">
      <div class="user-profile">
        <div class="avatar sm" id="footer-avatar" style="background:linear-gradient(135deg,#6c63ff,#a78bfa)"></div>
        <div class="profile-info">
          <div class="profile-name" id="footer-name">—</div>
          <div class="profile-dept" id="footer-dept">—</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Chat -->
  <main class="chat-main" id="chat-main">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">💬</div>
      <div class="empty-title">Your messages</div>
      <div class="empty-sub">Pick a conversation or start a new one with a classmate</div>
    </div>

    <div id="chat-view" style="display:none; flex:1; display:flex; flex-direction:column; overflow:hidden; display:none;">
      <!-- Chat Header -->
      <div class="chat-header">
        <div class="btn-icon back-btn" title="Back" onclick="closeChat()" style="display:none;margin-right:4px;">←</div>
        <div class="avatar" id="chat-avatar" style="background:linear-gradient(135deg,#6c63ff,#a78bfa)"></div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="chat-name">—</div>
          <div class="chat-header-status" id="chat-status">Active now</div>
        </div>
        <div class="chat-header-actions">
          <div class="btn-icon" title="View profile">👤</div>
        </div>
      </div>

      <!-- Messages -->
      <div class="messages-area" id="messages-area"></div>

      <!-- Input -->
      <div class="chat-input-area">
        <div class="input-row">
          <textarea class="message-input" id="msg-input" rows="1"
            placeholder="Write a message…"
            onkeydown="handleMsgKeydown(event)"
            oninput="autoResize(this)"></textarea>
          <button class="btn-send" onclick="sendMessage()">➤</button>
        </div>
      </div>
    </div>
  </main>

  <!-- Users panel (slide-in) -->
  <aside class="users-panel" id="users-panel">
    <div class="users-panel-header">
      <div class="users-panel-title">Start a conversation</div>
      <div class="btn-icon" onclick="toggleUsersPanel()">✕</div>
    </div>
    <div style="padding:12px 16px 8px">
      <input type="text" id="user-search" placeholder="Search people…" oninput="filterUsers()" style="font-size:13px;" />
    </div>
    <div class="users-list" id="users-list"></div>
  </aside>
</div>

<div id="toast"></div>

<script>
  // ─── Config ───────────────────────────────────────────────────────
  const API = 'https://message-hub-idv9.onrender.com';  // ← change to your backend URL

  // ─── State ────────────────────────────────────────────────────────
  let token = localStorage.getItem('mh_token');
  let currentUser = JSON.parse(localStorage.getItem('mh_user') || 'null');
  let activeChatUser = null;
  let allConversations = [];
  let allUsers = [];
  let pollInterval = null;

  const avatarColors = [
    ['#6c63ff','#a78bfa'],['#f59e0b','#fbbf24'],['#10b981','#34d399'],
    ['#3b82f6','#60a5fa'],['#ec4899','#f9a8d4'],['#8b5cf6','#c4b5fd'],
  ];

  function getAvatarStyle(name) {
    const i = (name?.charCodeAt(0) || 0) % avatarColors.length;
    const [c1, c2] = avatarColors[i];
    return `background:linear-gradient(135deg,${c1},${c2})`;
  }

  function getInitials(name) {
    if (!name) return '?';
    return name.split(' ').map(p => p[0]).join('').slice(0,2).toUpperCase();
  }

  // ─── Toast ────────────────────────────────────────────────────────
  function showToast(msg, dur = 2500) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), dur);
  }

  // ─── Auth Tabs ────────────────────────────────────────────────────
  function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('login-form').style.display = isLogin ? '' : 'none';
    document.getElementById('signup-form').style.display = isLogin ? 'none' : '';
    document.querySelectorAll('.tab-btn').forEach((b, i) =>
      b.classList.toggle('active', isLogin ? i === 0 : i === 1)
    );
  }

  // ─── Login ────────────────────────────────────────────────────────
  async function handleLogin() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl    = document.getElementById('login-error');
    const btn      = document.getElementById('login-btn');

    if (!email || !password) { showErr(errEl, 'Please fill in all fields.'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';

    try {
      const fd = new FormData();
      fd.append('username', email);
      fd.append('password', password);

      const res = await fetch(`${API}/login`, { method: 'POST', body: fd });
      const data = await res.json();

      if (!res.ok) throw new Error(data.detail || 'Login failed');

      token = data.access_token;
      localStorage.setItem('mh_token', token);

      // Fetch user list to find current user (by matching email if needed)
      await bootApp();
    } catch(e) {
      showErr(errEl, e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  // ─── Signup ───────────────────────────────────────────────────────
  async function handleSignup() {
    const name     = document.getElementById('signup-name').value.trim();
    const email    = document.getElementById('signup-email').value.trim();
    const dept     = document.getElementById('signup-dept').value.trim();
    const faculty  = document.getElementById('signup-faculty').value.trim();
    const password = document.getElementById('signup-password').value;
    const errEl    = document.getElementById('signup-error');
    const btn      = document.getElementById('signup-btn');

    if (!name || !email || !dept || !faculty || !password) {
      showErr(errEl, 'Please fill in all fields.'); return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>';

    try {
      const res = await fetch(`${API}/signup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, department: dept, faculty, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Signup failed');

      showToast('Account created! Please sign in.');
      switchTab('login');
      document.getElementById('login-email').value = email;
    } catch(e) {
      showErr(errEl, e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  }

  function showErr(el, msg) {
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 4000);
  }

  // ─── Logout ───────────────────────────────────────────────────────
  function handleLogout() {
    clearInterval(pollInterval);
    localStorage.removeItem('mh_token');
    localStorage.removeItem('mh_user');
    token = null; currentUser = null; activeChatUser = null;
    document.getElementById('auth-page').classList.add('active');
    document.getElementById('app-page').classList.remove('active');
    showToast('Signed out successfully');
  }

  // ─── Boot App ─────────────────────────────────────────────────────
  async function bootApp() {
    // Load conversations + users
    try {
      const [convsRes, usersRes] = await Promise.all([
        authFetch('/messages/conversations'),
        authFetch('/users')
      ]);

      if (convsRes.status === 401 || usersRes.status === 401) {
        handleLogout(); return;
      }

      allConversations = await convsRes.json();
      allUsers = await usersRes.json();

      // Determine current user from users list by matching any known id
      // (we'll store it after first fetch if not present)
      if (!currentUser && allConversations.length) {
        // Infer current user id from a conversation
      }

      showAppPage();
      renderConversations();
      renderUsersPanel();
      renderUsersDir();

      // Start polling
      clearInterval(pollInterval);
      pollInterval = setInterval(pollUpdates, 10000);
    } catch(e) {
      console.error('Boot error', e);
    }
  }

  function showAppPage() {
    document.getElementById('auth-page').classList.remove('active');
    document.getElementById('app-page').classList.add('active');

    // Set footer user info from token payload
    try {
      const payload = JSON.parse(atob(token.split('.')[1]));
      const uid = parseInt(payload.sub);

      // Find in allUsers — won't work (current user excluded from /users)
      // so we store name from sign-in if available
      const stored = JSON.parse(localStorage.getItem('mh_user') || 'null');
      if (stored) {
        document.getElementById('footer-name').textContent = stored.name || 'You';
        document.getElementById('footer-dept').textContent = stored.department || '';
        const av = document.getElementById('footer-avatar');
        av.textContent = getInitials(stored.name);
        av.style = `width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:12px;font-weight:700;flex-shrink:0;${getAvatarStyle(stored.name)}`;
      }
    } catch(_) {}
  }

  // ─── Auth fetch ───────────────────────────────────────────────────
  function authFetch(path, opts = {}) {
    return fetch(`${API}${path}`, {
      ...opts,
      headers: { Authorization: `Bearer ${token}`, ...(opts.headers || {}) }
    });
  }

  // ─── Render conversations ─────────────────────────────────────────
  function renderConversations(filter = '') {
    const list = document.getElementById('conversation-list');
    const filtered = allConversations.filter(c =>
      c.name.toLowerCase().includes(filter.toLowerCase())
    );

    if (!filtered.length) {
      list.innerHTML = `<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">
        ${filter ? 'No results' : 'No conversations yet.<br>Start chatting!'}
      </div>`;
      return;
    }

    list.innerHTML = filtered.map(c => {
      const initials = getInitials(c.name);
      const style = getAvatarStyle(c.name);
      const time = formatTime(c.timestamp);
      const active = activeChatUser?.user_id === c.user_id ? 'active' : '';
      return `
        <div class="conv-item ${active}" onclick="openChat(${c.user_id}, '${escHtml(c.name)}')">
          <div class="avatar" style="${style}">${initials}</div>
          <div class="conv-info">
            <div class="conv-name">${escHtml(c.name)}</div>
            <div class="conv-preview">${escHtml(c.last_message)}</div>
          </div>
          <div class="conv-meta">
            <span class="conv-time">${time}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  // ─── Render users panel (slide-in) ────────────────────────────────
  function renderUsersPanel(filter = '') {
    const list = document.getElementById('users-list');
    const filtered = allUsers.filter(u =>
      u.name.toLowerCase().includes(filter.toLowerCase()) ||
      u.email.toLowerCase().includes(filter.toLowerCase())
    );

    list.innerHTML = filtered.map(u => {
      const initials = getInitials(u.name);
      const style = getAvatarStyle(u.name);
      return `
        <div class="user-item" onclick="startChatFromPanel(${u.id}, '${escHtml(u.name)}')">
          <div class="avatar sm" style="${style}">${initials}</div>
          <div class="user-info">
            <div class="user-name">${escHtml(u.name)}</div>
            <div class="user-dept">${escHtml(u.email)}</div>
          </div>
        </div>
      `;
    }).join('');
  }

  // ─── Render users directory tab ───────────────────────────────────
  function renderUsersDir(filter = '') {
    const list = document.getElementById('users-dir-list');
    const filtered = allUsers.filter(u =>
      u.name.toLowerCase().includes(filter.toLowerCase())
    );

    // Group alphabetically
    const groups = {};
    filtered.forEach(u => {
      const letter = u.name[0].toUpperCase();
      if (!groups[letter]) groups[letter] = [];
      groups[letter].push(u);
    });

    const letters = Object.keys(groups).sort();
    list.innerHTML = letters.map(letter => `
      <div class="alpha-group">
        <div class="alpha-label">${letter}</div>
      </div>
      ${groups[letter].map(u => {
        const style = getAvatarStyle(u.name);
        return `
          <div class="user-item" onclick="openChat(${u.id}, '${escHtml(u.name)}')">
            <div class="avatar sm" style="${style}">${getInitials(u.name)}</div>
            <div class="user-info">
              <div class="user-name">${escHtml(u.name)}</div>
              <div class="user-dept">${escHtml(u.email)}</div>
            </div>
          </div>
        `;
      }).join('')}
    `).join('');
  }

  // ─── Sidebar tabs ─────────────────────────────────────────────────
  function switchSidebarTab(tab, el) {
    document.querySelectorAll('.stab').forEach(b => b.classList.remove('active'));
    el.classList.add('active');

    const convList = document.getElementById('conversation-list');
    const dirList  = document.getElementById('users-dir-list');
    const searchEl = document.getElementById('conv-search');

    if (tab === 'chats') {
      convList.style.display = '';
      dirList.style.display  = 'none';
      searchEl.placeholder   = 'Search conversations…';
      searchEl.oninput       = filterConversations;
    } else {
      convList.style.display = 'none';
      dirList.style.display  = '';
      searchEl.placeholder   = 'Search people…';
      searchEl.oninput       = () => renderUsersDir(searchEl.value);
    }
  }

  function filterConversations() {
    renderConversations(document.getElementById('conv-search').value);
  }
  function filterUsers() {
    renderUsersPanel(document.getElementById('user-search').value);
  }

  // ─── Open chat ────────────────────────────────────────────────────
  async function openChat(userId, userName) {
    activeChatUser = { user_id: userId, name: userName };

    // Update header
    document.getElementById('chat-name').textContent = userName;
    document.getElementById('chat-avatar').textContent = getInitials(userName);
    document.getElementById('chat-avatar').style = `width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:18px;font-weight:700;flex-shrink:0;${getAvatarStyle(userName)}`;

    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('chat-view').style.display = 'flex';

    // Mobile: slide sidebar out, chat in
    const isMobile = window.innerWidth <= 700;
    if (isMobile) {
      document.getElementById('sidebar').classList.add('chat-open');
      document.getElementById('chat-main').classList.add('chat-open');
    }

    // Show loading
    const area = document.getElementById('messages-area');
    area.innerHTML = `<div class="loading-msgs"><div class="spinner"></div> Loading messages…</div>`;

    // Highlight sidebar
    renderConversations(document.getElementById('conv-search').value);

    await loadMessages(userId);
    if (!isMobile) document.getElementById('msg-input').focus();
  }

  // ─── Close chat (mobile back button) ─────────────────────────────
  function closeChat() {
    document.getElementById('sidebar').classList.remove('chat-open');
    document.getElementById('chat-main').classList.remove('chat-open');
    activeChatUser = null;
    // Re-render so active highlight clears
    renderConversations(document.getElementById('conv-search').value);
  }

  async function startChatFromPanel(userId, userName) {
    document.getElementById('users-panel').classList.remove('open');
    await new Promise(r => setTimeout(r, 150));
    await openChat(userId, userName);
  }

  // ─── Load messages ────────────────────────────────────────────────
  async function loadMessages(userId) {
    const uid = userId || activeChatUser?.user_id;
    if (!uid) return;

    try {
      const res = await authFetch(`/messages/chat/${uid}`);
      if (!res.ok) throw new Error();
      const msgs = await res.json();
      renderMessages(msgs);
    } catch(e) {
      console.error('Failed to load messages', e);
    }
  }

  function renderMessages(msgs) {
    const area = document.getElementById('messages-area');
    if (!msgs.length) {
      area.innerHTML = `
        <div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--muted)">
          <div style="font-size:32px">👋</div>
          <div style="font-size:14px">Say hello to ${escHtml(activeChatUser?.name || 'them')}!</div>
        </div>`;
      return;
    }

    // Figure out current user id from token
    let myId = null;
    try { myId = parseInt(JSON.parse(atob(token.split('.')[1])).sub); } catch(_) {}

    // Group by day
    const groups = {};
    msgs.forEach(m => {
      const day = new Date(m.timestamp).toDateString();
      if (!groups[day]) groups[day] = [];
      groups[day].push(m);
    });

    area.innerHTML = Object.entries(groups).map(([day, dayMsgs]) => `
      <div class="msg-group-label">${formatDay(day)}</div>
      ${dayMsgs.map(m => {
        const sent = m.sender_id === myId;
        const time = new Date(m.timestamp).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
        return `
          <div class="msg ${sent ? 'sent' : 'recv'}">
            <div class="msg-bubble">${escHtml(m.content)}</div>
            <div class="msg-time">${time}</div>
          </div>`;
      }).join('')}
    `).join('');

    // Scroll to bottom
    area.scrollTop = area.scrollHeight;
  }

  // ─── Send message ─────────────────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const content = input.value.trim();
    if (!content || !activeChatUser) return;

    input.value = '';
    input.style.height = '';

    try {
      const res = await authFetch('/messages/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ receiver_id: activeChatUser.user_id, content })
      });
      if (!res.ok) throw new Error();
      await loadMessages(activeChatUser.user_id);
      await refreshConversations();
    } catch(e) {
      showToast('Failed to send message');
    }
  }

  function handleMsgKeydown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  // ─── Poll updates ─────────────────────────────────────────────────
  async function pollUpdates() {
    await refreshConversations();
    if (activeChatUser) await loadMessages(activeChatUser.user_id);
  }

  async function refreshConversations() {
    try {
      const res = await authFetch('/messages/conversations');
      if (res.ok) {
        allConversations = await res.json();
        renderConversations(document.getElementById('conv-search').value);
      }
    } catch(_) {}
  }

  // ─── Users panel toggle ───────────────────────────────────────────
  function toggleUsersPanel() {
    document.getElementById('users-panel').classList.toggle('open');
  }

  // ─── Helpers ─────────────────────────────────────────────────────
  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatTime(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    const now = new Date();
    if (d.toDateString() === now.toDateString()) {
      return d.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
    }
    const diff = (now - d) / 86400000;
    if (diff < 7) return d.toLocaleDateString([], { weekday: 'short' });
    return d.toLocaleDateString([], { month:'short', day:'numeric' });
  }

  function formatDay(dayStr) {
    const d = new Date(dayStr);
    const now = new Date();
    if (d.toDateString() === now.toDateString()) return 'Today';
    const diff = Math.round((now - d) / 86400000);
    if (diff === 1) return 'Yesterday';
    return d.toLocaleDateString([], { weekday:'long', month:'long', day:'numeric' });
  }

  // ─── Init ─────────────────────────────────────────────────────────
  if (token) {
    bootApp();
  }

  // Enter key for auth forms
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('login-form').style.display !== 'none') {
      if (document.activeElement.closest('#login-form')) handleLogin();
    } else {
      if (document.activeElement.closest('#signup-form')) handleSignup();
    }
  });
</script>
</body>
</html>
